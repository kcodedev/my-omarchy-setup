# Hyprland configuration overrides
# Add your custom settings here

# Shell scripts bindings
unbind = SUPER SHIFT, P
unbind = SUPER SHIFT, Z
unbind = SUPER SHIFT, U
unbind = SUPER SHIFT, I
unbind = SUPER SHIFT, semicolon
bindd = SUPER SHIFT, P, Project Launcher, exec, $HOME/Repos/shell-scripts/project-launch.sh
bindd = SUPER SHIFT, Z, Session Launcher, exec, $HOME/Repos/shell-scripts/project-launch.sh active
bindd = SUPER SHIFT, U, Bookmark Launcher, exec, $HOME/Repos/shell-scripts/bm-launch.sh
bindd = SUPER SHIFT, I, Cheatsheet Launcher, exec, $HOME/Repos/shell-scripts/cheatsheet-launch.sh
bindd = SUPER SHIFT, semicolon, Git Repo Status, exec, $HOME/Repos/shell-scripts/git_repo_status.sh

# Screenshot Capture bindings
unbind = SUPER SHIFT, C
bindd = SUPER SHIFT, C, Screenshot with editing, exec, omarchy-cmd-screenshot

# Unbind default SUPER SHIFT W if any
unbind = SUPER SHIFT, W
bindd = SUPER SHIFT, W, Restart iWD, exec, ~/Repos/my-omarchy-setup/scripts/restart-iwd.sh

