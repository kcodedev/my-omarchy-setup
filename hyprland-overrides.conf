# Hyprland configuration overrides
# Add your custom settings here

# Shell scripts bindings
bindd = SUPER SHIFT, P, Project Launcher, exec, /home/kob/Repos/shell-scripts/project-launch.sh
bindd = SUPER SHIFT, U, Bookmark Launcher, exec, /home/kob/Repos/shell-scripts/bm-launch.sh
bindd = SUPER SHIFT, I, Cheatsheet Launcher, exec, /home/kob/Repos/shell-scripts/cheatsheet-launch.sh
bindd = SUPER SHIFT, semicolon, Git Repo Status, exec, /home/kob/Repos/shell-scripts/git_repo_status.sh

# Screenshot Capture bindings
unbind = SUPER SHIFT, C
bindd = SUPER SHIFT ALT, C, Screenshot with editing, exec, omarchy-cmd-screenshot
bindd = SUPER SHIFT, C, Screenshot to clipboard, exec, omarchy-cmd-screenshot smart clipboard

# Unbind default SUPER SHIFT W if any
unbind = SUPER SHIFT, W
bindd = SUPER SHIFT, W, Restart iWD, exec, /home/kob/Repos/my-omarchy-setup/scripts/restart-iwd.sh

# Browser binding
unbind = SUPER, B
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
